kind = "web"
previewPath = "/"
title = "MemoraAI"
version = "1.0.0"
id = "artifacts/memoraai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20076

[services.development]
run = "pnpm --filter @workspace/memoraai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/memoraai", "run", "build" ]
publicDir = "artifacts/memoraai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20076"
BASE_PATH = "/"
